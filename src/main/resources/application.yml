spring:

  # ai智能助手配置
  ai:
    openai:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      chat:
        options:
          model: deepseek-v4-pro

  # 邮件配置（发送验证码等）
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  # 异步任务线程池（@Async 使用，避免 SimpleAsyncTaskExecutor 无限创建线程）
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 200
      thread-name-prefix: async-

  web:
    resources:
      static-locations: classpath:/static/

  application:
    name: furniture-system

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/furniture-system?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: root
    password: root

  jackson:
    default-property-inclusion: non_null

  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  type-aliases-package: com.example.furnituresystem.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.example.furnituresystem: debug

# 阿里云 OSS 配置
aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    key: ${OSS_ACCESS_KEY}
    secret: ${OSS_SECRET_KEY}
    bucket: ${OSS_BUCKET}
    url: ${OSS_URL}

# RocketMQ 配置
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: furniture-producer

# 监控告警配置
monitor:
  alert-enabled: false              # 是否启用中间件异常邮件告警
  alert-emails: ${MAIL_USERNAME}                # 告警接收邮箱
