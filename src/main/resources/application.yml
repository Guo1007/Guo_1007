spring:


  # 邮件配置（发送验证码等）
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  # Thymeleaf 配置（邮件模板）
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

  # 异步任务线程池（@Async 使用，避免 SimpleAsyncTaskExecutor 无限创建线程）
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 200
      thread-name-prefix: async-

  web:
    resources:
      static-locations: classpath:/static/

  application:
    name: furniture-system

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/furniture-system?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_ROOT_PASSWORD:root}

  jackson:
    default-property-inclusion: non_null

  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  type-aliases-package: gcy.system.entity
  configuration:
    map-underscore-to-camel-case: true

langchain4j:
  open-ai:
    streaming-chat-model:
      api-key: ${CHAT_AI_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: qwen-max
      log-requests: true
      log-responses: true
    embedding-model:
      api-key: ${EMBEDDING_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: text-embedding-v3
      log-requests: true
      log-responses: true
      max-segments-per-batch: 10
  community:
    redis:
      host: ${LANGCHAIN_REDIS_HOST:localhost}
      port: ${LANGCHAIN_REDIS_PORT:6379}

logging:
  level:
    gcy.system: debug
    gcy.ai: debug
    dev.langchain4j: debug

# 阿里云 OSS 配置
aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    key: ${OSS_ACCESS_KEY}
    secret: ${OSS_SECRET_KEY}
    bucket: ${OSS_BUCKET}
    url: ${OSS_URL}

# RocketMQ 配置
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: furniture-producer

# 监控告警配置
monitor:
  alert-enabled: false              # 是否启用中间件异常邮件告警
  alert-emails: ${MAIL_USERNAME}                # 告警接收邮箱


# 订单配置
order:
  payment-timeout-minutes: 1440  # 未支付订单超时自动取消（分钟），默认 24 小时

server:
  port: 8081
