spring:

  # 邮件配置（发送验证码等）
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  web:
    resources:
      static-locations: classpath:/static/
  application:
    name: furniture-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/furniture-system?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: root
    password: root
  jackson:
    default-property-inclusion: non_null
  #    json:
  #      write:
  #        write-numbers-as-strings: true
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  type-aliases-package: com.example.furnituresystem.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.example.furnituresystem: debug

# 阿里云 OSS 配置
aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    key: ${OSS_ACCESS_KEY}
    secret: ${OSS_SECRET_KEY}
    bucket: ${OSS_BUCKET}
    url: ${OSS_URL}

# 监控告警配置
monitor:
  alert:
    enabled: false                  # 是否启用告警
    silence-seconds: 300             # 告警静默期（秒）
    window-seconds: 60               # 错误统计时间窗口（秒）
    threshold: 10                    # 时间窗口内触发告警的错误次数