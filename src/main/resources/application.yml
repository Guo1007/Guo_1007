spring:
  web:
    resources:
      static-locations: classpath:/static/,file:${upload.path}
  application:
    name: furniture-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/furniture-system?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: root
    password: root
  jackson:
    default-property-inclusion: non_null
  #    json:
  #      write:
  #        write-numbers-as-strings: true
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s

mybatis-plus:
  type-aliases-package: com.example.furnituresystem.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.example.furnituresystem: debug

upload:
  path: D:/uploads/
  url-prefix: /uploads/