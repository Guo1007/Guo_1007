<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>订单通知</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f5; font-family: 'Microsoft YaHei', Arial, sans-serif;">
<div style="max-width: 480px; margin: 30px auto; background: #fff; border-radius: 4px; border: 1px solid #e8e8e8;">
    <!-- Header -->
    <div style="padding: 24px 30px; border-bottom: 1px solid #eee;">
        <span style="font-size: 16px; font-weight: 600; color: #333;">家具商城</span>
    </div>
    <!-- Content -->
    <div style="padding: 32px 30px; text-align: center;">
        <div style="display: inline-block; width: 64px; height: 64px; border-radius: 50%; line-height: 64px; font-size: 32px; margin-bottom: 16px;"
             th:style="'display:inline-block;width:64px;height:64px;border-radius:50%;line-height:64px;font-size:32px;margin-bottom:16px;background:#f5f5f5'"
             th:text="${statusIcon}">📦
        </div>
        <h2 style="font-size: 18px; color: #333; margin: 0 0 12px 0; font-weight: 600;" th:text="${title}">订单状态更新</h2>
        <p style="color: #666; font-size: 14px; line-height: 1.8; margin: 0;" th:text="${content}">您的订单状态已更新</p>
    </div>
    <!-- Order Info -->
    <div style="margin: 0 30px 24px; background: #fafafa; border-radius: 4px; padding: 16px 20px;">
        <table style="width: 100%; border-collapse: collapse;">
            <tr>
                <td style="padding: 6px 0; color: #999; font-size: 13px; width: 80px;">订单编号</td>
                <td style="padding: 6px 0; color: #333; font-size: 13px; font-weight: 500;" th:text="${orderId}">123456</td>
            </tr>
            <tr th:if="${totalPrice}">
                <td style="padding: 6px 0; color: #999; font-size: 13px;">订单金额</td>
                <td style="padding: 6px 0; color: #333; font-size: 13px; font-weight: 500;" th:text="'¥' + ${totalPrice}">¥999.00</td>
            </tr>
            <tr th:if="${userName}">
                <td style="padding: 6px 0; color: #999; font-size: 13px;">收货人</td>
                <td style="padding: 6px 0; color: #333; font-size: 13px;" th:text="${userName}">张三</td>
            </tr>
        </table>
    </div>
    <!-- Footer -->
    <div style="padding: 16px 30px; border-top: 1px solid #eee;">
        <p style="color: #bbb; font-size: 12px; margin: 0;" th:text="'发送时间：' + ${sendTime}">2024-01-01 12:00:00</p>
    </div>
</div>
</body>
</html>
