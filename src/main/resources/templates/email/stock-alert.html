<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>库存预警</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f5; font-family: 'Microsoft YaHei', Arial, sans-serif;">
<div style="max-width: 480px; margin: 30px auto; background: #fff; border-radius: 4px; border: 1px solid #e8e8e8;">
    <!-- Header -->
    <div style="padding: 24px 30px; border-bottom: 1px solid #eee;">
        <span style="font-size: 16px; font-weight: 600; color: #333;">家具商城 · 库存预警</span>
    </div>
    <!-- Content -->
    <div style="padding: 24px 30px;">
        <p style="color: #666; font-size: 14px; line-height: 1.8; margin: 0 0 16px 0;">
            以下商品库存不足 10 件，请及时补货：
        </p>
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
            <tr style="background: #fafafa;">
                <th style="padding: 10px 12px; border: 1px solid #eee; text-align: left; font-size: 13px; color: #666; font-weight: 500;">商品名称</th>
                <th style="padding: 10px 12px; border: 1px solid #eee; text-align: center; font-size: 13px; color: #666; font-weight: 500; width: 80px;">当前库存</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td style="padding: 8px 12px; border: 1px solid #eee; font-size: 13px; color: #333;" th:text="${item.fName} ?: '未知商品'">商品名称</td>
                <td style="padding: 8px 12px; border: 1px solid #eee; text-align: center; font-size: 13px; font-weight: 600; color: #e6a23c;" th:text="${item.stock} ?: '?'">0</td>
            </tr>
            </tbody>
        </table>
    </div>
    <!-- Footer -->
    <div style="padding: 16px 30px; border-top: 1px solid #eee;">
        <p style="color: #bbb; font-size: 12px; margin: 0;" th:text="'发送时间：' + ${sendTime}">2024-01-01 12:00:00</p>
    </div>
</div>
</body>
</html>
