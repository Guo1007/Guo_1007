<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>验证码</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f5; font-family: 'Microsoft YaHei', Arial, sans-serif;">
<div style="max-width: 480px; margin: 30px auto; background: #fff; border-radius: 4px; border: 1px solid #e8e8e8;">
    <!-- Header -->
    <div style="padding: 24px 30px; border-bottom: 1px solid #eee;">
        <span style="font-size: 16px; font-weight: 600; color: #333;">家具商城</span>
    </div>
    <!-- Content -->
    <div style="padding: 32px 30px;">
        <p style="color: #333; font-size: 14px; margin: 0 0 12px 0;">您好，</p>
        <p style="color: #666; font-size: 14px; line-height: 1.8; margin: 0 0 24px 0;">
            您正在进行<span th:text="${action}" style="color: #333; font-weight: 500;">操作</span>，验证码如下：
        </p>
        <div style="background: #fafafa; border-radius: 4px; padding: 16px; text-align: center; margin-bottom: 24px;">
            <span style="font-size: 28px; font-weight: 700; color: #333; letter-spacing: 6px;" th:text="${code}">123456</span>
        </div>
        <p style="color: #999; font-size: 13px; margin: 0 0 4px 0;">
            验证码 <span th:text="${expireMinutes}">5</span> 分钟内有效，请勿泄露给他人。
        </p>
        <p style="color: #999; font-size: 13px; margin: 0;">如非本人操作，请忽略此邮件。</p>
    </div>
    <!-- Footer -->
    <div style="padding: 16px 30px; border-top: 1px solid #eee;">
        <p style="color: #bbb; font-size: 12px; margin: 0;" th:text="'发送时间：' + ${sendTime}">2024-01-01 12:00:00</p>
    </div>
</div>
</body>
</html>
